<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --bg-quote: rgba(99, 102, 241, 0.04);
      --border: #e5e2d9;
      --text: #1a1a1a;
      --text-dim: #6b6b6b;
      --text-muted: #a0a0a0;
      --accent: #6366f1;
      --accent-light: rgba(99, 102, 241, 0.1);
      --success: #22c55e;
      --error: #ef4444;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      padding: 20px 16px;
      min-width: 300px;
    }

    /* ── Header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }
    .logo-mark { color: var(--accent); }

    /* ── Status bar ── */
    .status {
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }
    .status-type {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      text-transform: lowercase;
    }
    .status-type::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .status-type.article::before { background: #60a5fa; }
    .status-type.youtube::before { background: #f87171; }
    .status-type.podcast::before { background: #a78bfa; }

    /* ── Clip preview ── */
    .clip-preview {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      line-height: 1.5;
      color: #3a3a3a;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-left: 3px solid var(--accent);
      background: var(--bg-quote);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    /* ── Compose ── */
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Newsreader', Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    textarea::placeholder { color: var(--text-muted); font-style: italic; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover:not(:disabled) { background: #818cf8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 28px;
      margin-bottom: 12px;
      color: var(--accent);
      opacity: 0.4;
    }
    .empty p { margin-bottom: 6px; }
    .empty .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ── Recent annotations ── */
    .recent-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .recent-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .recent-item-quote {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .recent-item-commentary {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-mark">✦</span> annotated
  </div>

  <div id="status" class="status" style="display:none"></div>
  <div id="clip" class="clip-preview" style="display:none"></div>

  <div id="empty" class="empty">
    <div class="empty-icon">✦</div>
    <p>Select text on any page to clip it.</p>
    <p class="hint">
      Highlight a sentence or two → add your take → post.<br>
      <strong>⌘⇧A</strong> to toggle annotate mode.
    </p>
  </div>

  <div id="compose" style="display:none">
    <textarea id="commentary" placeholder="What's your take?"></textarea>
    <button id="post-btn" class="btn" disabled>✦ Post Annotation</button>
  </div>

  <div id="recent" style="display:none">
    <div class="recent-header">Recent</div>
    <div id="recent-list"></div>
  </div>

  <script src="src/sidepanel.js"></script>
</body>
</html>
