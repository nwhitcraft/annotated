<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --bg-surface: #f7f7f5;
      --bg-hover: #f0f0ee;
      --border: #deded9;
      --text: #1a1a1a;
      --text-dim: #6b6b6b;
      --text-muted: #999999;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #22c55e;
      --error: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      padding: 20px 16px;
      min-width: 300px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }
    .logo-mark { color: var(--accent); }

    /* ── Status bar ── */
    .status {
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }
    .status-type::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .status-type.article::before { background: #2563eb; }
    .status-type.youtube::before { background: #dc2626; }
    .status-type.podcast::before { background: #7c3aed; }


    /* ── Clip preview ── */
    .clip-preview {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      line-height: 1.5;
      color: #333333;
      padding: 10px 12px;
      margin-bottom: 16px;
      border-left: 1px solid #bfbfba;
      background: transparent;
      border-radius: 0;
    }

    /* ── Compose ── */
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: 'Newsreader', Georgia, serif;
      font-size: 15px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    textarea:focus {
      border-color: var(--accent);
    }
    textarea::placeholder { color: var(--text-muted); font-style: italic; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: 1px solid var(--text);
      border-radius: 0;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--bg-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 28px;
      margin-bottom: 12px;
      color: var(--accent);
      opacity: 0.4;
    }
    .empty p { margin-bottom: 6px; }
    .empty .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ── Recent annotations ── */
    .recent-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .recent-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .recent-item > div:last-child {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .recent-item-quote {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .recent-item-commentary {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-mark">✦</span> annotated
  </div>

  <div id="status" class="status" style="display:none"></div>
  <div id="clip" class="clip-preview" style="display:none"></div>

  <div id="empty" class="empty">
    <div class="empty-icon">✦</div>
    <p>Select text on any page to clip it.</p>
    <p class="hint">
      Highlight a sentence or two → add your take → post.<br>
      <strong>⌘⇧A</strong> to toggle annotate mode.
    </p>
  </div>

  <div id="compose" style="display:none">
    <textarea id="commentary" placeholder="What's your take?"></textarea>
    <button id="post-btn" class="btn" disabled>✦ Post Annotation</button>
  </div>

  <div id="recent" style="display:none">
    <div class="recent-header">Recent</div>
    <div id="recent-list"></div>
  </div>

  <script src="src/sidepanel.js"></script>
</body>
</html>
