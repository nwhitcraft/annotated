<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fafaf8;
      --bg-surface: #f7f7f5;
      --bg-hover: #f0f0ee;
      --border: #deded9;
      --border-subtle: #eeeeec;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #dc2626;
      --article: #2563eb;
      --youtube: #dc2626;
      --podcast: #7c3aed;
      --font-serif: "Newsreader", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    body { padding: 16px 18px 22px; }

    button, textarea { font: inherit; }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    [hidden] { display: none !important; }

    .shell {
      display: grid;
      gap: 18px;
    }

    .topline {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1;
    }

    .shortcut-line {
      padding: 0 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .shortcut-line kbd {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
    }

    .auth-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: 13px;
    }
    .auth-profile {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 7px;
      color: inherit;
      text-decoration: none;
    }
    .auth-avatar {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 700;
      overflow: hidden;
    }
    .auth-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .auth-user {
      max-width: 124px;
      overflow: hidden;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .auth-edit { color: var(--accent); text-decoration: none; font-size: 12px; font-family: var(--font-sans); font-weight: 500; }
    .auth-edit:hover { text-decoration: underline; }
    .auth-signin { color: var(--accent); text-decoration: none; font-family: var(--font-sans); font-weight: 500; }
    .auth-signin:hover { text-decoration: underline; }

    .auth-editor {
      display: grid;
      gap: 10px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .auth-editor label {
      display: grid;
      gap: 5px;
    }

    .auth-editor span {
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .auth-editor input,
    .auth-editor textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      outline: none;
      padding: 7px 8px;
    }

    .auth-editor textarea {
      min-height: 68px;
      resize: vertical;
    }

    .auth-editor input:focus,
    .auth-editor textarea:focus {
      border-color: var(--accent);
    }

    .auth-editor-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .auth-editor-actions button,
    .auth-editor-actions a {
      padding: 0;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-editor-actions button:hover,
    .auth-editor-actions a:hover {
      text-decoration: underline;
    }

    .auth-editor-error {
      margin: 0;
      color: var(--danger);
      font-size: 12px;
    }

    .onboarding-banner {
      display: grid;
      gap: 6px;
      padding: 12px 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .onboarding-banner strong {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.1;
    }

    .onboarding-banner a {
      justify-self: start;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .onboarding-banner a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .status {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--article);
    }

    .status-dot.youtube { background: var(--youtube); }
    .status-dot.podcast { background: var(--podcast); }

    .status-source {
      color: var(--text-primary);
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .feed-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .feed-header h2 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 25px;
      font-weight: 400;
      line-height: 1.05;
    }

    .feed-header span,
    .feed-empty,
    .source-line {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .feed-list {
      display: grid;
      border-top: 1px solid var(--border);
    }

    .feed-item {
      display: grid;
      gap: 8px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .feed-item a {
      color: inherit;
      text-decoration: none;
    }

    .feed-item a:hover {
      color: var(--accent-hover);
    }

    .feed-byline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--text-tertiary);
      font-size: 11px;
    }

    .feed-commentary {
      margin: 0;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.22;
    }

    .feed-quote {
      margin: 0;
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 16px;
      font-style: italic;
      line-height: 1.36;
    }

    .feed-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .feed-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0;
      color: inherit;
      line-height: 1.2;
    }

    .feed-action:hover {
      color: var(--accent-hover);
    }

    .feed-action.is-active {
      color: var(--text-primary);
    }

    .feed-action-credible {
      color: #28704f;
    }

    .feed-action-disagree,
    .feed-action-report:hover {
      color: var(--danger);
    }

    .feed-report-form {
      display: grid;
      gap: 8px;
      padding: 10px 0 0;
      border-top: 1px solid var(--border-subtle);
    }

    .feed-report-form strong {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 500;
    }

    .feed-report-form textarea {
      min-height: 74px;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      outline: none;
      resize: vertical;
    }

    .feed-report-form textarea:focus {
      border-color: var(--accent);
    }

    .feed-report-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
    }

    .feed-report-actions button {
      padding: 0;
      color: var(--accent);
      font-weight: 600;
    }

    .feed-report-actions button:hover {
      text-decoration: underline;
    }

    .feed-report-error,
    .feed-report-confirmation {
      margin: 0;
      font-size: 12px;
    }

    .feed-report-error {
      color: var(--danger);
    }

    .feed-report-confirmation {
      color: var(--text-secondary);
    }

    .feed-empty {
      margin: 0;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topline">
      <div class="wordmark">annotated</div>
      <div id="auth-slot"></div>
    </header>

    <div id="status" class="status" hidden></div>
    <div id="onboarding-banner" class="onboarding-banner" hidden></div>

    <div class="shortcut-line">
      <kbd>Ctrl⇧X</kbd> / <kbd>⌥⇧X</kbd> to Annotate
    </div>

    <section id="feed-section">
      <header class="feed-header">
        <h2 id="feed-title">Feed</h2>
        <span id="feed-count"></span>
      </header>
      <div id="feed-list" class="feed-list"></div>
    </section>
  </main>

  <script src="src/sidepanel.js"></script>
</body>
</html>
