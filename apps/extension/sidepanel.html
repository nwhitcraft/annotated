<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fafaf8;
      --bg-surface: #f7f7f5;
      --bg-hover: #f0f0ee;
      --border: #deded9;
      --border-subtle: #eeeeec;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #dc2626;
      --article: #2563eb;
      --youtube: #dc2626;
      --podcast: #7c3aed;
      --font-serif: "Newsreader", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    body { padding: 16px 18px 22px; }

    button, textarea { font: inherit; }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    [hidden] { display: none !important; }

    .shell {
      display: grid;
      gap: 18px;
    }

    .topline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1;
    }

    .clip-mode-button {
      padding: 4px 0 2px;
      border-bottom: 1px solid currentColor;
      color: var(--accent-hover);
      font-size: 12px;
      font-weight: 600;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .shortcut-row kbd {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
    }

    .shortcut-row button {
      padding: 3px 0 1px;
      border-bottom: 1px solid currentColor;
      color: var(--accent-hover);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--article);
    }

    .status-dot.youtube { background: var(--youtube); }
    .status-dot.podcast { background: var(--podcast); }

    .status-source {
      color: var(--text-primary);
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .clip-preview {
      margin: 0;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 21px;
      font-style: italic;
      line-height: 1.32;
    }

    .clip-meta {
      margin: -10px 0 0;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .compose {
      display: grid;
      gap: 12px;
    }

    label {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 132px;
      padding: 14px 0;
      border: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 20px;
      line-height: 1.42;
      outline: none;
      resize: vertical;
    }

    textarea::placeholder { color: var(--text-tertiary); }

    textarea:focus { border-bottom-color: var(--accent-hover); }

    .btn {
      justify-self: end;
      padding: 8px 0 3px;
      border-bottom: 1px solid currentColor;
      color: var(--accent-hover);
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
    }

    .btn:hover:not(:disabled) { color: var(--accent); }

    .empty {
      display: grid;
      gap: 12px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .empty strong {
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 27px;
      font-weight: 400;
      line-height: 1.05;
    }

    .empty p {
      margin: 0;
    }

    .feed-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .feed-header h2 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 25px;
      font-weight: 400;
      line-height: 1.05;
    }

    .feed-header span,
    .feed-empty,
    .source-line {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .feed-list {
      display: grid;
      border-top: 1px solid var(--border);
    }

    .feed-item {
      display: grid;
      gap: 8px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .feed-item a {
      color: inherit;
      text-decoration: none;
    }

    .feed-item a:hover {
      color: var(--accent-hover);
    }

    .feed-byline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--text-tertiary);
      font-size: 11px;
    }

    .feed-commentary {
      margin: 0;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.22;
    }

    .feed-quote {
      margin: 0;
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 16px;
      font-style: italic;
      line-height: 1.36;
    }

    .feed-empty {
      margin: 0;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topline">
      <div class="wordmark">annotated</div>
      <button id="clip-mode-btn" class="clip-mode-button">Clip</button>
    </header>

    <div id="status" class="status" hidden></div>

    <div class="shortcut-row">
      <span><kbd id="shortcut-label">Command+Shift+X</kbd> to Annotate</span>
      <button id="shortcut-btn">Change</button>
    </div>

    <section id="empty" class="empty">
      <strong><span id="empty-shortcut">Command+Shift+X</span> to Annotate.</strong>
      <p>Or use Clip above to start clipping mode.</p>
    </section>

    <blockquote id="clip" class="clip-preview" hidden></blockquote>
    <p id="clip-meta" class="clip-meta" hidden></p>

    <section id="compose" class="compose" hidden>
      <label for="commentary">Commentary</label>
      <textarea id="commentary" placeholder="Write the take people should respond to..."></textarea>
      <button id="post-btn" class="btn" disabled>Post annotation</button>
    </section>

    <section id="feed-section">
      <header class="feed-header">
        <h2 id="feed-title">Feed</h2>
        <span id="feed-count"></span>
      </header>
      <div id="feed-list" class="feed-list"></div>
    </section>
  </main>

  <script src="src/sidepanel.js"></script>
</body>
</html>
