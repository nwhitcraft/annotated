<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated</title>
  <style>
    :root {
      --bg-primary: #fafaf8;
      --bg-surface: #f7f7f5;
      --bg-hover: #f0f0ee;
      --border: #deded9;
      --border-subtle: #eeeeec;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #dc2626;
      --article: #2563eb;
      --youtube: #dc2626;
      --podcast: #7c3aed;
      --font-serif: "Newsreader", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
    }

    body { padding: 16px 18px 22px; }

    button, textarea { font: inherit; }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    [hidden] { display: none !important; }

    .shell {
      display: grid;
      gap: 18px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1;
    }

    .shortcut-line {
      padding: 0 0 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .shortcut-line kbd {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
    }

    .auth-button,
    .avatar-button {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
    }

    .avatar-button {
      border-radius: 50%;
      overflow: hidden;
    }

    .avatar-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .compose {
      display: grid;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .compose-title {
      margin: 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .compose textarea,
    .compose input,
    .compose select {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      font: inherit;
    }

    .compose textarea {
      min-height: 92px;
      padding: 8px;
      font-family: var(--font-serif);
      font-size: 18px;
      resize: vertical;
    }

    .compose-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .compose button,
    .claim-form button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
    }

    .clip-preview {
      margin: 0;
      color: var(--text-tertiary);
      font-family: var(--font-serif);
      font-size: 15px;
      font-style: italic;
    }

    .claim-form {
      display: grid;
      gap: 8px;
      padding: 10px 0;
      border-top: 1px solid var(--border-subtle);
    }

    .status {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--article);
    }

    .status-dot.youtube { background: var(--youtube); }
    .status-dot.podcast { background: var(--podcast); }

    .status-source {
      color: var(--text-primary);
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .feed-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .feed-header h2 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 25px;
      font-weight: 400;
      line-height: 1.05;
    }

    .feed-header span,
    .feed-empty,
    .source-line {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .feed-list {
      display: grid;
      border-top: 1px solid var(--border);
    }

    .feed-item {
      display: grid;
      gap: 8px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .feed-item a {
      color: inherit;
      text-decoration: none;
    }

    .feed-item a:hover {
      color: var(--accent-hover);
    }

    .feed-byline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--text-tertiary);
      font-size: 11px;
    }

    .feed-commentary {
      margin: 0;
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.22;
    }

    .feed-quote {
      margin: 0;
      color: var(--text-secondary);
      font-family: var(--font-serif);
      font-size: 16px;
      font-style: italic;
      line-height: 1.36;
    }

    .feed-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .feed-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0;
      color: inherit;
      line-height: 1.2;
    }

    .feed-action:hover {
      color: var(--accent-hover);
    }

    .feed-empty {
      margin: 0;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topline">
      <div class="wordmark">annotated</div>
      <div id="auth-slot"></div>
    </header>

    <div id="status" class="status" hidden></div>

    <div class="shortcut-line">
      <kbd>Command+Shift+A</kbd> to Annotate
    </div>

    <section id="compose" class="compose" hidden></section>

    <section id="feed-section">
      <header class="feed-header">
        <h2 id="feed-title">Feed</h2>
        <span id="feed-count"></span>
      </header>
      <div id="feed-list" class="feed-list"></div>
    </section>
  </main>

  <script src="src/sidepanel.js"></script>
</body>
</html>
